name: Build Windows executable

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Build executable
        run: |
          pyinstaller --onefile --windowed --name LMR400_Long_Line_SWR_Visualizer lmr400_long_line_swr_visualizer.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: LMR400_Long_Line_SWR_Visualizer_Windows
          path: dist/LMR400_Long_Line_SWR_Visualizer.exe

      - name: Attach executable to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/LMR400_Long_Line_SWR_Visualizer.exe
          generate_release_notes: true
